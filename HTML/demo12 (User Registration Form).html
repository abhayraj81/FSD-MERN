<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="post" action="" novalidate autocomplete="off">
        <table border="1px" width="60%" align="center" bgcolor="silver">
        <thead>
            <tr>
                <th colspan="2">USER REGISTRATION</th>
            </tr>
        </thead>
        <tbody align="center">
            <tr>
                <td>User Name </td>
                <td>
                    <input type="text" name="un" required minlength="2" maxlength="10"/>
                </td>
            </tr>
            <tr>
                <td>Password</td>
                <td>
                    <input type="password" name="pswd" required/>
                </td>
            </tr>
            <tr>
                <td>E-mail</td>
                <td>
                    <input type="email" name="mail" required/>
                </td>
            </tr>
            <tr>
                <td>D.O.B</td>
                <td>
                    <input type="date" min="2000-01-01" max="2007-03-31" name="dob"/>
                </td>
            </tr>
            <tr>
                <td>Date and Time</td>
                <td>
                    <input type="datetime-local" name="dat"/>
                </td>
            </tr>                  
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gen" id="m"/>
                    <label for="m">Male</label>
                    <input type="radio" name="gen" id="f"/>
                    <label for="f">FeMale</label>
                    <input type="radio" name="gen" id="o"/>
                    <label for="o">Others</label>
                </td>
            </tr>
            <tr>
                <td>Hobbies</td>
                <td>
                    <input type="checkbox" name="chk1" id="chk1"/>
                    <label for="chk1">Playing Instrument</label>                
                    <input type="checkbox" name="chk2" id="chk2"/>
                    <label for="chk2">Drawing</label>
                    <input type="checkbox" name="chk3" id="chk3"/>
                    <label for="chk3">Reading</label>
                    <input type="checkbox" name="chk4" id="chk4"/>
                    <label for="chk4">Sports</label>
                    <input type="checkbox" name="chk5" id="chk5"/>
                    <label for="chk5">other</label>                
            </tr>
            <tr>
                <td>Qualification </td>
                <td>
                    <select name="course">
                        <option>Select</option>
                        <option>MCA </option>
                        <option>BTech </option>
                        <option>BCA </option>
                        <option>BBA </option>
                        <option>MBA </option>
                    </select>
                </td>
            </tr>
            <tr>
                ]<td>University Name</td>
                <td>
                    <input type="text" list="mylist" name="dt"/>
                    <datalist  id="mylist">
                        <option>AKTU</option>
                        <option>CSJM</option>
                        <option>LPU</option>
                        <option>DU</option>
                        <option>IT BHU</option>
                        <option>JNU</option>
                    </datalist>
                </td>
            </tr>
            <tr>
                <td>Upload Pic</td>
                <td>
                    <input type="file" accept="image/*" multiple name="img"/>
                </td>
            </tr>
            <tr>
                <td>Range</td>
                <td>
                    <input type="range" min="100" max="600" name="r"/>
                </td>
            </tr>
            <tr>
                <td colspan="4">
                    <input type="submit"/>
                    <input type="reset"/>
                    <input type="button" value="ARK"/>
                    <input type="image" src="../ark (mca)/Images/img4.webp" width="15px"/>
                </td>
            </tr>
        </tbody>
        <tfoot>
            <tr>

            </tr>
            <tr>

            </tr>
        </tfoot>
    </table>
    </form>
</body>
</html>
