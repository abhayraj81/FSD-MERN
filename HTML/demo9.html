<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <marquee behaviour="alternate"
        scrollamount="20" 
        direction="right" 
        height="350px"
        onmouseover="stop()"
        onmouseout="start()">
        <img src="./Images/img.jpg" width="100px" />
        <img src="./Images/img2.png" width="100px" />
        <img src="./Images/img3.png" width="100px" />
        <img src="./Images/img4.webp" width="100px" />
    </marquee>
    <marquee behaviour="alternate"
        scrollamount="20" 
        direction="left" 
        height="350px"
        onmouseover="stop()"
        onmouseout="start()">
        <img src="./Images/img.jpg" width="100px" />
        <img src="./Images/img2.png" width="100px" />
        <img src="./Images/img3.png" width="100px" />
        <img src="./Images/img4.webp" width="100px" />
    </marquee>
    <marquee behaviour="alternate"
        scrollamount="20" 
        direction="up" 
        height="125px"
        onmouseover="stop()"
        onmouseout="start()">
        <img src="./Images/img.jpg" width="100px" />
        <img src="./Images/img2.png" width="100px" />
        <img src="./Images/img3.png" width="100px" />
        <img src="./Images/img4.webp" width="100px" />
    </marquee>
    <marquee behaviour="alternate"
        scrollamount="20" 
        direction="down" 
        height="125px"
        onmouseover="stop()"
        onmouseout="start()">
        <img src="./Images/img.jpg" width="100px" />
        <img src="./Images/img2.png" width="100px" />
        <img src="./Images/img3.png" width="100px" />
        <img src="./Images/img4.webp" width="100px" />
    </marquee>
</body>
</html>
