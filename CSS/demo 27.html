<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div to center via flex box method 2</title>
    <style>
        body{
            height: 100vh;
        }
        div{
            background-color: royalblue;
            width: 200px;
            height: 200px;
            position: relative;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
    </style>
</head>
<body>
    <div>
        My Div
    </div>
</body>
</html>
