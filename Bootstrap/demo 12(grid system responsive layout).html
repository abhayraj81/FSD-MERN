<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid System (responsive layout)</title>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
     <style>
        .container>div>div:nth-child(odd){
            background-color: rgb(255, 255, 255);
            text-align: center;
        }
     
        .container>div>div:nth-child(even){
            background-color:rgb(255, 255, 255);
            text-align: center;
        }
     </style>
</head>
<body>
    <div class="container">

        <!-- <div class="row">
            <div class="col-lg-2 col-md-4 col-md-6">col 1</div>

            <div class="col-lg-4 col-md-4 col-md-6">col 1</div>
            <div class="col-lg-2 col-md-4 col-md-6">col 1</div>
        </div> -->
        <div class="row">
            <div class="col-lg-3 col-md-4 col-md-6">
                <div class="card mt-5 bg-danger">
                    <div class="card-content">
                        <div class="card-header">Header</div>
                            <img src="../Images/img3.png" class="card-img-top"/>
                        <div class="card-body">Body</div>
                        <div class="card-footer">Footer</div>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-4 col-md-6">

                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-4 col-md-6">

                        <div class="card-footer">Footer</div>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-4 col-md-6">
                <div class="card mt-5 bg-warning">
                    <div class="card-content">
                        <div class="card-header">Header</div>
                            <img src="../Images/img3.png" class="card-img-top"/>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
