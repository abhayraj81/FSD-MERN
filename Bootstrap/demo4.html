<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
</head>
<body>
    <div class="container">
    
        <span class="spinner-border"></span>
        <span class="spinner-border text-info"></span>
        <span class="spinner-border text-danger"></span>
        <span class="spinner-border text-warning"></span>
        <span class="spinner-border text-dark"></span>
        <span class="spinner-border text-muted"></span>
        <span class="spinner-border text-primary"></span>
        <span class="spinner-border text-secdondary"></span>
        <br>
        <span class="spinner-grow"></span>
        <span class="spinner-grow text-danger"></span>
        <span class="spinner-grow spinner-grow-sm text-warning"></span>

    </div>
    


    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
