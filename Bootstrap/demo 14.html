<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid System (responsive layout)</title>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
     <style>
        .container>div>div:nth-child(odd){
            background-color: rgb(255, 255, 255);
            text-align: center;
        }
     
        .container>div>div:nth-child(even){
            background-color:rgb(255, 255, 255);
            text-align: center;
        }
        .carousel-item>img{
            width: 275px;
            height: 100%;            
        }
     </style>
</head>
<body>
    <div class="container-fluid">

        <nav class="navbar navbar-expand-lg bg-warning navbar-light">

            <img src="../Images/img2.png" 
            class="navbar-brand" 
            style="width: 30px;">

            <button class="navbar-toggler"
                    data-toggle="collapse" 
                    data-target="#myNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div id="myNav" class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" >Link 1</a></li>
                    <li class="nav-item"><a class="nav-link" >Link 2</a></li>
                    <li class="nav-item"><a class="nav-link" >Link 3</a></li>
                    <li class="nav-item"><a class="nav-link" >Link 4</a></li>
                    <li class="nav-item"><a class="nav-link" >Link 5</a></li>
                    <li class="nav-item"><a class="nav-link" >Link 6</a></li>
                </ul>

            </div>    
        </nav>

        <div class="container">
        <div class="carousel slide" 
        data-ride="carousel"
        data-interval="500"        
        data-pause="hover"
        id="myCarousel">

            <div class="carousel-inner">
                <!-- First Image -->
                <div class="carousel-item active">
                    <img src="../Images/img.jpg">
                </div>
                <!-- Second Image -->
                <div class="carousel-item">
                    <img src="../Images/img2.png">
                </div>
                <!-- Third Image -->
                <div class="carousel-item">
                    <img src="../Images/img3.png">
                </div>
                <!-- Fourth Image -->
                <div class="carousel-item">
                    <img src="../Images/img4.webp">
                </div>

            </div>

            <!-- previous button -->

            <a href="#myCarousel" 
            class="carousel-control-prev btn-dark"
            data-slide="prev">
            <span class="carousel-control-prev-icon"></span>
            </a>

            <!-- next button -->

            <a href="#myCarousel" 
            class="carousel-control-next btn-dark"
            data-slide="next">
            <span class="carousel-control-next-icon"></span>
            </a>

            <!-- indicators -->

            <ul class="carousel-indicators">
                <li data-target="#myCarousel" data-slide-to=0></li>
                <li data-target="#myCarousel" data-slide-to=1></li>
                <li data-target="#myCarousel" data-slide-to=3></li>
            </ul>
        </div>
    </div>


            

            
     

    </div>

    



    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
</body>
</body>
</html>
