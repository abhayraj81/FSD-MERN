<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #title{
            display:none;
        }
        #icon:hover + #title{
            display: block;
            
            
        }
        input:focus{
            background-color: aqua;
            font-size: large;
            display: block;
            color: crimson;
        
        }
    </style>
</head>
<body>
    <div>
        <span id="icon">🏠</span>
        <span id="title">HOME</span>
        <input type="text"/>
    </div>
        
    
</body>
</html>
