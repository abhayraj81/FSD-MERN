<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .mylink{
            text-decoration: none;
            position: relative;
        }
        .mylink::before{
            content: "";
            position: absolute;
            left: 50%;
            transform: translate(-50%);
            top: 23px;
            width: 0px;
            height: 2px;
            background-color: navy;
            transition: 0.2s;
        }
        .mylink:hover::before{
          
            width: 100%;
        }
    </style>
</head>
<body>
    <a href="#" class="mylink">
        DEMO TEXT
    </a>
</body>
</html>
