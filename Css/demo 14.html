<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #title{
            display: none;
        }
        #icon:hover + #title{
            display: block;
        }
        div{
            width: 100%;
            height: 100px;
            text-align: center;
            font-size: xx-large;
            border: 1px solid;
            margin-bottom: 10px;
        }
        #d1{
            background-color: crimson;
        }
        #d2{
            background-color: aqua;
        }
        #d3{
            background-color: blue;
        }
        #d4{
            background-color: yellow;
        }
        div{
            back
        }
        
        #d1:hover + #d2{
            background-color: burlywood;
            display: block;
        }
    </style>
</head>
<body>
    <div>
        <span id="icon">🏠</span>
        <span id="title">HOME</span>
    </div>
    <div id="d1">My Division 1</div>
    <div id="d2">My Division 2</div>
    <div id="d3">My Division 3</div>
    <div id="d4">My Division 4</div>
    
</body>
</html>
